<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>
  <!-- Terminal prompt > -->
  <text x="10" y="38" font-family="monospace" font-weight="bold" font-size="28" fill="url(#glow)">$_</text>
  <!-- Blinking cursor -->
  <rect x="44" y="20" width="3" height="22" rx="1" fill="#22c55e" opacity="0.8"/>
  <!-- Top dots (terminal buttons) -->
  <circle cx="14" cy="12" r="3" fill="#ef4444" opacity="0.8"/>
  <circle cx="24" cy="12" r="3" fill="#eab308" opacity="0.8"/>
  <circle cx="34" cy="12" r="3" fill="#22c55e" opacity="0.8"/>
</svg>
